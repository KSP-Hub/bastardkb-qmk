name: QMK Build (Official Setup)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your files
        uses: actions/checkout@v4

      - name: Setup QMK Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi python3-pip
          python3 -m pip install qmk milc appdirs

          # ВМЕСТО GIT CLONE: Используем официальную инициализацию
          # Она сама скачает qmk_firmware в правильное место
          qmk setup -y -home /home/runner/qmk_firmware

          qmk config user.qmk_home=/home/runner/qmk_firmware
          qmk config user.overlay_dir=$(pwd)

          # Синхронизируем подмодули
          cd /home/runner/qmk_firmware
          qmk git-submodule

      - name: Compile & Breadcrumbs
        run: |
          qmk compile -kb bastardkb/charybdis/4x6 -km wellum

          mkdir -p diagnostics
          find .build -name "info_config.h" -exec cp {} diagnostics/build_config.txt \; || echo "No config found"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: charybdis-final-v118
          path: |
            *.uf2
            diagnostics/*.txt
