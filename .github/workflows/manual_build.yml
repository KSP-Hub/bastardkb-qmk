name: QMK Build (Clean Overlay)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your files
        uses: actions/checkout@v4

      - name: Setup Clean QMK Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi python3-pip
          python3 -m pip install qmk milc

          # Клонируем основной репозиторий QMK (ИСПРАВЛЕННЫЙ АДРЕС)
          git clone --depth 1 https://github.com /home/runner/qmk_firmware

          # Настраиваем конфигурацию QMK
          qmk config user.qmk_home=/home/runner/qmk_firmware
          qmk config user.overlay_dir=$(pwd)

          # Синхронизируем подмодули
          cd /home/runner/qmk_firmware
          qmk git-submodule

      - name: Compile & Breadcrumbs
        run: |
          # Собираем прошивку wellum
          qmk compile -kb bastardkb/charybdis/4x6 -km wellum

          # Сбор хлебных крошек
          mkdir -p diagnostics
          find .build -name "info_config.h" -exec cp {} diagnostics/build_config.txt \; || echo "No config found"
          ls -R .build > diagnostics/files_list.txt || echo "No build folder"

      - name: Upload firmware and breadcrumbs
        uses: actions/upload-artifact@v4
        with:
          name: charybdis-final-v110
          path: |
            *.uf2
            diagnostics/*.txt
          if-no-files-found: error
