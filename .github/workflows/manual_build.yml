name: QMK Build

on:
  workflow_dispatch:
    inputs:
      keyboard:
        description: 'Keyboard path (e.g. "bastardkb/charybdis/4x6/v2/splinky_2")'
        required: true
        default: 'bastardkb/charybdis/4x6/v2/splinky_2'
      keymap:
        description: 'Keymap name (e.g. "wellum")'
        required: true
        default: 'wellum'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
    
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-pip
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi
          sudo apt-get install -y avr-libc avrdude binutils-avr dfu-programmer dfu-util gcc-avr
          sudo apt-get install -y libusb-1.0-0-dev libusb-dev

      - name: Install QMK dependencies
        run: |
          # Сначала устанавливаем все зависимости из requirements
          python3 -m pip install -r requirements.txt
          python3 -m pip install -r requirements-dev.txt
          
          # Теперь устанавливаем QMK
          python3 -m pip install --user qmk
          
          # Добавляем qmk в PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify QMK installation
        run: |
          # Проверяем установку
          which qmk
          qmk --version
          
          # Проверяем окружение
          qmk doctor || echo "qmk doctor found minor issues (expected)"

      - name: Configure QMK
        run: |
          # Устанавливаем клавиатуру и раскладку
          qmk config user.keyboard=${{ github.event.inputs.keyboard }}
          qmk config user.keymap=${{ github.event.inputs.keymap }}
          
          # Проверяем конфигурацию
          qmk config

      - name: Initialize submodules
        run: |
          # Инициализируем подмодули
          git submodule update --init --recursive

      - name: Compile firmware
        run: |
          echo "Compiling firmware for ${{ github.event.inputs.keyboard }} with keymap ${{ github.event.inputs.keymap }}"
          qmk compile -v -kb ${{ github.event.inputs.keyboard }} -km ${{ github.event.inputs.keymap }}

      # Перемещаем определение пути к прошивке ПОСЛЕ компиляции
      - name: Determine firmware path
        if: success()
        id: firmware-path
        run: |
          # Заменяем слеши на подчеркивания в пути к клавиатуре
          KEYBOARD_PATH=$(echo "${{ github.event.inputs.keyboard }}" | tr '/' '_')
          FIRMWARE_FILE=".build/${KEYBOARD_PATH}_${{ github.event.inputs.keymap }}.uf2"
          
          if [ ! -f "$FIRMWARE_FILE" ]; then
            FIRMWARE_FILE=".build/${KEYBOARD_PATH}_${{ github.event.inputs.keymap }}.hex"
          fi
          
          if [ ! -f "$FIRMWARE_FILE" ]; then
            echo "Firmware file not found!"
            exit 1
          fi
          
          echo "FIRMWARE_PATH=$FIRMWARE_FILE" >> $GITHUB_OUTPUT
          echo "Firmware will be at: $FIRMWARE_FILE"

      # Диагностический шаг
      - name: DIAGNOSTIC Check build directory contents
        if: always()
        run: |
          echo "==================== DIAGNOSTIC INFORMATION ===================="
          echo "Current working directory:"
          pwd
          
          echo -e "\nDirectory structure of workspace:"
          ls -la
          
          echo -e "\nChecking if .build directory exists:"
          if [ -d ".build" ]; then
            echo ".build directory exists!"
            echo -e "\nContents of .build directory:"
            ls -laR .build
            
            echo -e "\nSearching for firmware files in .build:"
            find .build -name "*.uf2" -o -name "*.hex" -o -name "*.bin"
          else
            echo ".build directory DOES NOT EXIST!"
          fi
          
          echo -e "\nSearching for firmware files in entire workspace:"
          find . -name "*.uf2" -o -name "*.hex" -o -name "*.bin"
          
          echo "==================== END OF DIAGNOSTIC ===================="

      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ${{ steps.firmware-path.outputs.FIRMWARE_PATH }}
          if-no-files-found: error
