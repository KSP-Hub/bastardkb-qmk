name: QMK Build

on:
  workflow_dispatch:
    inputs:
      keyboard:
        description: 'Keyboard path (e.g. "bastardkb/charybdis/4x6/v2/splinky_2")'
        required: true
        default: 'bastardkb/charybdis/4x6/v2/splinky_2'
      keymap:
        description: 'Keymap name (e.g. "wellum")'
        required: true
        default: 'wellum'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-pip
          # ARM tools for RP2040
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi
          # AVR tools (QMK is required even for ARM builds)
          sudo apt-get install -y avr-libc avrdude binutils-avr dfu-programmer dfu-util gcc-avr
          # Additional tools for Pico SDK
          sudo apt-get install -y libusb-1.0-0-dev libusb-dev

      - name: Install QMK dependencies
        run: |
          # Установка зависимостей из корня репозитория
          python3 -m pip install -r $GITHUB_WORKSPACE/requirements.txt
          python3 -m pip install -r $GITHUB_WORKSPACE/requirements-dev.txt
          
          # Установка QMK
          python3 -m pip install --user qmk
          
          # Добавление qmk в PATH для всех последующих шагов
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          
          # Проверка установки QMK
          which qmk
          qmk --version
          
          # Настройка окружения QMK
          qmk setup -y
          qmk setup -y pico
          qmk setup -y arm-none-eabi
          qmk json2c --force keyboards/${{ github.repository }}
          
          # Проверка окружения
          qmk doctor

      - name: Determine firmware filename
        id: firmware-filename
        run: |
          # Форматируем имя файла прошивки: заменяем / на _ и добавляем расширение
          FIRMWARE_FILENAME=$(echo ${{ github.event.inputs.keyboard }} | tr '/' '_' )_${{ github.event.inputs.keymap }}.uf2
          echo "FIRMWARE_FILENAME=$FIRMWARE_FILENAME" >> $GITHUB_OUTPUT
          echo "Firmware file will be: $FIRMWARE_FILENAME"

      - name: Compile firmware
        id: compile
        run: |
          echo "Compiling firmware for ${{ github.event.inputs.keyboard }} with keymap ${{ github.event.inputs.keymap }}"
          qmk -v compile -kb ${{ github.event.inputs.keyboard }} -km ${{ github.event.inputs.keymap }} 2>&1 | tee compile.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Compilation completed with exit code $EXIT_CODE"
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Compilation failed with exit code $EXIT_CODE"
            echo "Detailed error log:"
            cat compile.log
            exit $EXIT_CODE
          fi
          
          # Проверка наличия файла прошивки
          if [ ! -f ".build/${{ steps.firmware-filename.outputs.FIRMWARE_FILENAME }}" ]; then
            echo "::error::Firmware file not found: .build/${{ steps.firmware-filename.outputs.FIRMWARE_FILENAME }}"
            ls -la .build
            exit 1
          fi

      # DIAGNOSTIC STEP (CRITICAL)
      - name: DIAGNOSTIC Check build directory contents
        if: always()
        run: |
          echo "==================== DIAGNOSTIC INFORMATION ===================="
          echo "Current working directory:"
          pwd
          
          echo -e "\nDirectory structure of workspace:"
          ls -la
          
          echo -e "\nChecking if .build directory exists:"
          if [ -d ".build" ]; then
            echo ".build directory exists!"
            echo -e "\nContents of .build directory:"
            ls -laR .build
            
            echo -e "\nSearching for firmware files in .build:"
            find .build -name "*.uf2" -o -name "*.hex" -o -name "*.bin"
          else
            echo ".build directory DOES NOT EXIST!"
          fi
          
          echo -e "\nSearching for firmware files in entire workspace:"
          find . -name "*.uf2" -o -name "*.hex" -o -name "*.bin"
          
          echo "==================== END OF DIAGNOSTIC ===================="
          echo "PATH: $PATH"

      - name: Upload firmware
        if: "success() && steps.compile.conclusion == 'success'"
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .build/${{ steps.firmware-filename.outputs.FIRMWARE_FILENAME }}
          if-no-files-found: error
