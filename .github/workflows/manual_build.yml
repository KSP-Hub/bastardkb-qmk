name: Build QMK Firmware

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi python3-pip

      - name: Install QMK Python CLI
        run: |
          python3 -m pip install --upgrade qmk

      - name: Clone QMK Firmware
        run: |
          git clone --recursive https://github.com /home/runner/qmk_firmware
          cd /home/runner/qmk_firmware
          qmk setup -y qmk/qmk_firmware

      - name: Build Firmware
        run: |
          cd /home/runner/qmk_firmware
          qmk compile -kb <your_keyboard> -km <your_keymap>
