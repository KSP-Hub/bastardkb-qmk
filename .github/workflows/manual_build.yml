name: Manual Build Wellum
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Compile
        uses: qmk/qmk_firmware/.github/actions/compile@master
        with:
          keyboard: bastardkb/charybdis/4x6/v2/splinky_2
          keymap: wellum
