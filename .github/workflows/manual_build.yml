name: QMK Build

on:
  workflow_dispatch:
    inputs:
      keyboard:
        description: 'Keyboard path (e.g. "bastardkb/charybdis/4x6/v2/splinky_2")'
        required: true
        default: 'bastardkb/charybdis/4x6/v2/splinky_2'
      keymap:
        description: 'Keymap name (e.g. "wellum")'
        required: true
        default: 'wellum'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install QMK and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-pip libnewlib-arm-none-eabi libstdc++-arm-none-eabi-dev
          python3 -m pip install qmk
          qmk setup -y
          qmk doctor

      - name: Compile firmware
        id: compile
        run: |
          echo "Starting compilation..."
          qmk -v compile -kb ${{ github.event.inputs.keyboard }} -km ${{ github.event.inputs.keymap }} | tee compile.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Compilation completed with exit code $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Compilation failed with exit code $EXIT_CODE"
            echo "Detailed error log:"
            cat compile.log
            exit $EXIT_CODE
          fi
        
      # DIAGNOSTIC STEP (CRITICAL)
      - name: DIAGNOSTIC Check build directory contents
        if: always()
        run: |
          echo "==================== DIAGNOSTIC INFORMATION ===================="
          echo "Current working directory:"
          pwd
          
          echo -e "\nDirectory structure of workspace:"
          ls -la
          
          echo -e "\nChecking if .build directory exists:"
          if [ -d ".build" ]; then
            echo ".build directory exists!"
            echo -e "\nContents of .build directory:"
            ls -laR .build
            
            echo -e "\nSearching for firmware files in .build:"
            find .build -name "*.uf2" -o -name "*.hex" -o -name "*.bin"
          else
            echo ".build directory DOES NOT EXIST!"
          fi
          
          echo -e "\nSearching for firmware files in entire workspace:"
          find . -name "*.uf2" -o -name "*.hex" -o -name "*.bin"
          
          echo "==================== END OF DIAGNOSTIC ===================="

      - name: Upload firmware
        if: "success() && steps.compile.conclusion == 'success'"
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            .build/**/*splinky*.uf2
            .build/**/*rp2040*.uf2
            .build/**/*.uf2
          if-no-files-found: error
