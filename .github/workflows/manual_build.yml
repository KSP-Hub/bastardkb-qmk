name: QMK Build

on:
  workflow_dispatch:
    inputs:
      keymap:
        description: 'Keymap name'
        required: true
        default: 'wellum'
      keyboard:
        description: 'Keyboard name'
        required: true
        default: 'bastardkb/charybdis/4x6/v2/splinky_2'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: DEBUG: Show repository structure
      run: |
        echo "===== Repository structure ====="
        ls -la
        echo "\n===== Submodules status ====="
        git submodule status
        echo "\n===== QMK directory structure ====="
        ls -la keyboards/bastardkb/charybdis/4x6/v2/splinky_2
        ls -la keyboards/bastardkb/charybdis/4x6/v2/splinky_2/keymaps/wellum
        
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install QMK
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install qmk
        qmk setup -y
        
    - name: Build firmware (VERBOSE MODE)
      run: |
        qmk compile -kb ${{ github.event.inputs.keyboard }} -km ${{ github.event.inputs.keymap }} -v
        
    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: |
          *.hex
          *.bin
          *.uf2
