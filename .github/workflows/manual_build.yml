name: QMK Build

on:
  workflow_dispatch:
    inputs:
      keyboard:
        description: 'Keyboard path'
        required: true
        default: 'bastardkb/charybdis/4x6/v2/splinky_2'
      keymap:
        description: 'Keymap name'
        required: true
        default: 'wellum'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi python3-pip
          python3 -m pip install qmk

      - name: QMK Setup
        run: qmk setup -y

      - name: Compile firmware
        run: |
          qmk compile -kb ${{ github.event.inputs.keyboard }} -km ${{ github.event.inputs.keymap }}

          # ====== ХЛЕБНЫЕ КРОШКИ (Безопасный сбор данных) ======
          # Сохраняем финальные настройки пинов и макросов в один файл
          find .build -name "info_config.h" -exec cp {} build_diag_config.txt \; || echo "No config found"
          # Сохраняем список всех скомпилированных объектов (чтобы видеть драйверы)
          ls -R .build > build_files_list.txt || echo "No build folder"

      - name: Upload firmware and logs
        uses: actions/upload-artifact@v4
        with:
          name: firmware-and-diagnostics
          # Сохраняем прошивку (.uf2) и наши крошки (.txt)
          path: |
            *.uf2
            *.txt
          if-no-files-found: error
