name: QMK Build (Docker Strategy)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Используем официальный образ QMK — в нем уже есть всё!
    container: qmkfm/qmk_cli
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compile Wellum
        run: |
          # В контейнере qmk setup не качает всё заново, а просто инициализирует
          qmk setup -y
          # Собираем твою раскладку
          qmk compile -kb bastardkb/charybdis/4x6 -km wellum

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: charybdis-wellum-v119
          path: "*.uf2"
