name: QMK Build

on:
  workflow_dispatch:
    inputs:
      keyboard:
        description: 'Keyboard path'
        required: true
        default: 'bastardkb/charybdis/4x6/v2/splinky_2'
      keymap:
        description: 'Keymap name'
        required: true
        default: 'wellum'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Скачиваем репозиторий вместе со всеми зависимостями (ChibiOS для RP2040)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. Устанавливаем компилятор для ARM (процессор RP2040) и сам QMK
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi
          python3 -m pip install qmk

      # 3. Подготовка и запуск компиляции
      - name: Compile firmware
        run: |
          qmk setup -y
          qmk compile -kb ${{ github.event.inputs.keyboard }} -km ${{ github.event.inputs.keymap }}

      # 4. Сохраняем готовый файл .uf2 в артефакты сборки
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: "*.uf2"
          if-no-files-found: error
