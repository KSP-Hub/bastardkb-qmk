name: QMK Build (Clean Overlay)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your files
        uses: actions/checkout@v4

      - name: Setup Clean QMK Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi python3-pip
          python3 -m pip install --upgrade pip
          # Устанавливаем qmk и недостающие зависимости (appdirs и другие)
          python3 -m pip install qmk milc appdirs

          git clone --depth 1 https://github.com /home/runner/qmk_firmware
          qmk config user.qmk_home=/home/runner/qmk_firmware
          qmk config user.overlay_dir=$(pwd)

          # Устанавливаем зависимости самого QMK, чтобы он не ругался
          python3 -m pip install -r /home/runner/qmk_firmware/requirements.txt

          cd /home/runner/qmk_firmware
          qmk git-submodule

      - name: Compile & Breadcrumbs
        run: |
          qmk compile -kb bastardkb/charybdis/4x6 -km wellum

          mkdir -p diagnostics
          find .build -name "info_config.h" -exec cp {} diagnostics/build_config.txt \; || echo "No config"
          ls -R .build > diagnostics/files_list.txt || echo "No build folder"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: charybdis-final-v116
          path: |
            *.uf2
            diagnostics/*.txt
          if-no-files-found: error
