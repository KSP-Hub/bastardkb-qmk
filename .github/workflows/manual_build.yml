name: Manual Build Wellum
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container: qmkfm/qmk_cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Compile
        run: |
          qmk compile -kb bastardkb/charybdis/4x6/v2/splinky_2 -km wellum
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: charybdis_firmware
          path: ./*.uf2
