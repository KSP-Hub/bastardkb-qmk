name: CI
on: [ pull_request, push, workflow_dispatch ]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions: {}

jobs:
  check-uid:
    name: Check Vial UIDs
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify Vial UID is unique per-keyboard
        run: python3 util/ci_vial_verify_uid.py

  build-vial:
    name: Build Charybdis 4x6 Vial
    runs-on: ubuntu-latest  # <--- ИЗМЕНЕНО: Убрали контейнер, вернули стандартный runner
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install QMK CLI
        run: |
          python -m pip install --upgrade pip
          pip install qmk

      - name: Initialize QMK
        run: qmk setup -y

      - name: Build Firmware
        run: |
          git config --global --add safe.directory $(pwd)
          # ВНИМАНИЕ: Если папка keymaps/vial отсутствует, поменяйте 'vial' на 'wellum'
          qmk compile -kb bastardkb/charybdis/4x6/v2/splinky_2 -km vial

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: Charybdis_4x6_RP2040_Vial_firmware
          path: |
            *.uf2
            *.hex
            *.bin
